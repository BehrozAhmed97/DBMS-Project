<!doctype html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <script src="//unpkg.com/alpinejs" defer></script>
    <script src="app.js"></script>
    <link rel="icon" href="/szabist.png" type="image/png" />    
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <title>ZABDESK — Recap Sheet Grade Analysis</title>
    <style>
        :root {
            --szab-navy: #0b3d91;
            --szab-navy-dark: #082c69;
            --szab-blue: #1e5fd6;
            --szab-blue-soft: #e8f0ff;
            --ink: #0f172a;
            --ink-soft: #475569;
            --muted: #64748b;
            --line: #e5e9f2;
            --bg: #f4f6fb;
            --card: #ffffff;
            --success: #16a34a;
            --warn: #f59e0b;
            --danger: #dc2626;
            --radius: 14px;
            --shadow-sm: 0 1px 2px rgba(15,23,42,.04), 0 1px 3px rgba(15,23,42,.06);
            --shadow-md: 0 10px 25px -12px rgba(11,61,145,.25), 0 4px 10px -6px rgba(15,23,42,.08);
        }

        * { box-sizing: border-box; }
        html, body { height: 100%; }
        body {
            margin: 0;
            font-family: 'Inter', 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background:
                radial-gradient(1200px 500px at -10% -20%, rgba(30,95,214,.10), transparent 60%),
                radial-gradient(900px 500px at 110% 0%, rgba(11,61,145,.10), transparent 55%),
                var(--bg);
            color: var(--ink);
            -webkit-font-smoothing: antialiased;
        }

        .topbar {
            background: linear-gradient(120deg, var(--szab-navy) 0%, var(--szab-navy-dark) 100%);
            color: #fff;
            border-bottom: 3px solid #f5b400;
        }
        .topbar-inner {
            max-width: 1180px;
            margin: 0 auto;
            padding: 18px 24px;
            display: flex;
            align-items: center;
            gap: 18px;
        }
        .brand {
            display: flex; align-items: center; gap: 16px;
        }
        .brand-logo {
            width: 70px; height: 70px;
            background: #fff;
            border-radius: 12px;
            display: grid; place-items: center;
            padding: 5px;
            box-shadow: 0 4px 14px rgba(0,0,0,.18), inset 0 0 0 1px rgba(245,180,0,.35);
        }
        .brand-logo img { width: 100%; height: 100%; object-fit: contain; }
        .brand-divider {
            width: 1px; align-self: stretch;
            background: linear-gradient(to bottom, transparent, rgba(255,255,255,.25), transparent);
            margin: 4px 2px;
        }
        .brand-text { line-height: 1.15; display: flex; flex-direction: column; gap: 2px; }
        .brand-title {
            font-weight: 800; font-size: 22px; letter-spacing: 1.2px;
        }
        .brand-sub {
            font-size: 12px; opacity: .78; font-weight: 500; letter-spacing: .4px;
            text-transform: uppercase;
        }
        .top-spacer { flex: 1; }
        @media (max-width: 520px) {
            .topbar-inner { padding: 14px 16px; gap: 12px; }
            .brand-logo { width: 44px; height: 44px; }
            .brand-title { font-size: 18px; letter-spacing: .8px; }
            .brand-sub { font-size: 11px; }
        }

        .shell {
            max-width: 1180px;
            margin: 32px auto 60px;
            padding: 0 24px;
        }

        .page-header {
            display: flex; align-items: flex-end; justify-content: space-between;
            gap: 16px; margin-bottom: 20px; flex-wrap: wrap;
        }
        .page-title { margin: 0; font-size: 26px; font-weight: 700; color: var(--ink); letter-spacing: -.01em; }
        .page-sub { margin: 6px 0 0; color: var(--muted); font-size: 14px; }

        .card {
            background: var(--card);
            border: 1px solid var(--line);
            border-radius: var(--radius);
            box-shadow: var(--shadow-sm);
        }

        .filters {
            padding: 22px;
            display: grid;
            grid-template-columns: repeat(4, minmax(0,1fr));
            gap: 16px;
        }
        @media (max-width: 900px) { .filters { grid-template-columns: repeat(2, 1fr); } }
        @media (max-width: 520px) { .filters { grid-template-columns: 1fr; } }

        .control-item { display: flex; flex-direction: column; gap: 8px; }
        .step-label {
            display: flex; align-items: center; gap: 8px;
            font-size: 12px; font-weight: 700;
            color: var(--ink-soft); text-transform: uppercase; letter-spacing: .06em;
        }
        .step-num {
            width: 22px; height: 22px; border-radius: 6px;
            background: var(--szab-blue-soft); color: var(--szab-navy);
            display: inline-grid; place-items: center;
            font-size: 12px; font-weight: 800;
        }
        select {
            appearance: none;
            -webkit-appearance: none;
            width: 100%;
            padding: 11px 38px 11px 14px;
            border: 1px solid var(--line);
            border-radius: 10px;
            font-size: 14px; color: var(--ink);
            background-color: #fff;
            background-image: url("data:image/svg+xml;utf8,<svg xmlns='http://www.w3.org/2000/svg' width='16' height='16' viewBox='0 0 24 24' fill='none' stroke='%230b3d91' stroke-width='2.4' stroke-linecap='round' stroke-linejoin='round'><polyline points='6 9 12 15 18 9'/></svg>");
            background-repeat: no-repeat;
            background-position: right 12px center;
            transition: border-color .15s, box-shadow .15s, background-color .15s;
        }
        select:hover:not(:disabled) { border-color: #c8d3e6; }
        select:focus {
            outline: none;
            border-color: var(--szab-blue);
            box-shadow: 0 0 0 4px rgba(30,95,214,.15);
        }
        select:disabled {
            background-color: #f4f6fb;
            color: #94a3b8;
            cursor: not-allowed;
        }

        .results { margin-top: 24px; padding: 26px; }

        .result-head {
            display: flex; justify-content: space-between; align-items: flex-start;
            gap: 20px; flex-wrap: wrap;
            padding-bottom: 20px; border-bottom: 1px solid var(--line);
        }
        .result-title {
            margin: 0; font-size: 20px; font-weight: 700; color: var(--ink);
            letter-spacing: -.01em;
        }
        .result-code {
            display: inline-block; margin-left: 8px;
            font-size: 12px; font-weight: 700; color: var(--szab-navy);
            background: var(--szab-blue-soft);
            padding: 3px 8px; border-radius: 6px; vertical-align: middle;
        }
        .meta-row { margin-top: 10px; display: flex; gap: 22px; flex-wrap: wrap; color: var(--ink-soft); font-size: 13px; }
        .meta-item { display: flex; gap: 6px; align-items: center; }
        .meta-item .k { color: var(--muted); }
        .meta-item .v { font-weight: 600; color: var(--ink); }

        .stat-cards { display: flex; gap: 12px; }
        .stat {
            min-width: 140px;
            padding: 14px 18px;
            border-radius: 12px;
            background: linear-gradient(135deg, var(--szab-navy), var(--szab-blue));
            color: #fff;
        }
        .stat .label { font-size: 11px; opacity: .85; font-weight: 600; letter-spacing: .05em; text-transform: uppercase; }
        .stat .value { font-size: 26px; font-weight: 800; margin-top: 4px; }

        .table-wrap { margin-top: 22px; overflow-x: auto; border: 1px solid var(--line); border-radius: 12px; }
        table { width: 100%; border-collapse: collapse; font-size: 14px; }
        thead th {
            text-align: left; font-size: 11px; font-weight: 700;
            color: var(--ink-soft); text-transform: uppercase; letter-spacing: .06em;
            background: #f8fafc;
            padding: 12px 16px;
            border-bottom: 1px solid var(--line);
        }
        tbody td { padding: 14px 16px; border-bottom: 1px solid var(--line); color: var(--ink); }
        tbody tr:last-child td { border-bottom: none; }
        tbody tr:hover { background: #fafbff; }

        .grade-chip {
            display: inline-grid; place-items: center;
            width: 38px; height: 30px; border-radius: 8px;
            background: var(--szab-blue-soft); color: var(--szab-navy);
            font-weight: 800; font-size: 13px; letter-spacing: .02em;
        }
        .pct { font-weight: 700; color: var(--szab-navy); }

        .bar-container {
            background-color: #eef2fa;
            border-radius: 999px;
            width: 100%; max-width: 260px;
            height: 10px; overflow: hidden;
        }
        .bar-fill {
            height: 100%;
            background: linear-gradient(90deg, var(--szab-blue), var(--szab-navy));
            border-radius: 999px;
            transition: width .5s cubic-bezier(.22,.61,.36,1);
        }

        .empty {
            margin-top: 24px;
            text-align: center;
            padding: 56px 24px;
            border: 1.5px dashed #cfd8ea;
            border-radius: var(--radius);
            background: #fbfcff;
            color: var(--muted);
        }
        .empty-icon {
            width: 56px; height: 56px; border-radius: 14px;
            background: var(--szab-blue-soft);
            display: inline-grid; place-items: center;
            margin-bottom: 12px;
            color: var(--szab-navy);
        }
        .empty h3 { margin: 0 0 6px; color: var(--ink); font-size: 16px; font-weight: 700; }
        .empty p { margin: 0; font-size: 14px; }

        .footer {
            max-width: 1180px; margin: 0 auto; padding: 20px 24px 40px;
            color: var(--muted); font-size: 12px; text-align: center;
        }
    </style>
</head>
<body>
    <header class="topbar">
        <div class="topbar-inner">
            <div class="brand">
                <div class="brand-logo">
                    <img src="/szabist.png" alt="SZABIST logo" />               
                </div>
                <div class="brand-divider"></div>
                <div class="brand-text">
                    <div class="brand-title">ZABDESK</div>
                    <div class="brand-sub">SZABIST · Academic Analytics</div>
                </div>
            </div>
            <div class="top-spacer"></div>
        </div>
    </header>

    <main class="shell" x-data="App()" x-init="init()">
        <div class="page-header">
            <div>
                <h1 class="page-title">Grade Distribution Analysis</h1>
                <p class="page-sub">Filter by year, semester, batch and course to view the recap sheet grade breakdown.</p>
            </div>
        </div>

        <section class="card filters" aria-label="Filters">
            <div class="control-item">
                <label class="step-label"><span class="step-num">1</span> Academic Year</label>
                <select @change="handleYearChange($event.target.value)" :value="selectedYear">
                    <option value="">-- Choose Year --</option>
                    <template x-for="yr in years">
                        <option :value="yr" x-text="yr"></option>
                    </template>
                </select>
            </div>

            <div class="control-item">
                <label class="step-label"><span class="step-num">2</span> Semester Term</label>
                <select :disabled="!selectedYear" @change="handleSemesterChange($event.target.value)" :value="selectedSemester">
                    <option value="">-- Choose Semester --</option>
                    <template x-for="sem in semesters">
                        <option :value="sem" x-text="sem"></option>
                    </template>
                </select>
            </div>

            <div class="control-item">
                <label class="step-label"><span class="step-num">3</span> Class Batch</label>
                <select :disabled="!selectedSemester" @change="handleClassChange($event.target.value)" :value="selectedClass">
                    <option value="">-- Choose Batch --</option>
                    <template x-for="cls in classes">
                        <option :value="cls" x-text="cls"></option>
                    </template>
                </select>
            </div>

            <div class="control-item">
                <label class="step-label"><span class="step-num">4</span> Subject Course</label>
                <select :disabled="!selectedClass" @change="handleCourseChange($event.target.value)" :value="selectedRid">
                    <option value="">-- Choose Course --</option>
                    <template x-for="crs in courses" :key="crs.rid">
                        <option :value="crs.rid" x-text="crs.code + ' - ' + crs.title"></option>
                    </template>
                </select>
            </div>
        </section>

        <template x-if="analysisData">
            <section class="card results">
                <div class="result-head">
                    <div>
                        <h2 class="result-title">
                            <span x-text="analysisData.meta.title"></span>
                            <span class="result-code" x-text="analysisData.meta.code"></span>
                        </h2>
                        <div class="meta-row">
                            <div class="meta-item"><span class="k">Batch:</span><span class="v" x-text="analysisData.meta.class"></span></div>
                            <div class="meta-item"><span class="k">Term:</span><span class="v" x-text="analysisData.meta.semester + ' ' + analysisData.meta.year"></span></div>
                        </div>
                    </div>
                    <div class="stat-cards">
                        <div class="stat">
                            <div class="label">Total Students</div>
                            <div class="value" x-text="analysisData.totalStudents"></div>
                        </div>
                    </div>
                </div>

                <div class="table-wrap">
                    <table>
                        <thead>
                            <tr>
                                <th style="width: 90px;">Grade</th>
                                <th style="width: 140px;">Students</th>
                                <th style="width: 140px;">Percentage</th>
                                <th>Distribution</th>
                            </tr>
                        </thead>
                        <tbody>
                            <template x-for="row in analysisData.distribution" :key="row.grade">
                                <tr>
                                    <td><span class="grade-chip" x-text="row.grade"></span></td>
                                    <td x-text="row.count"></td>
                                    <td><span class="pct" x-text="row.percentage"></span></td>
                                    <td>
                                        <div class="bar-container">
                                            <div class="bar-fill" :style="'width: ' + row.percentage"></div>
                                        </div>
                                    </td>
                                </tr>
                            </template>
                        </tbody>
                    </table>
                </div>
            </section>
        </template>

        <template x-if="!analysisData">
            <div class="empty">
                <div class="empty-icon">
                    <svg xmlns="http://www.w3.org/2000/svg" width="26" height="26" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M3 3v18h18"/><rect x="7" y="12" width="3" height="6"/><rect x="12" y="8" width="3" height="10"/><rect x="17" y="5" width="3" height="13"/></svg>
                </div>
                <h3>No analysis yet</h3>
                <p>Complete steps 1 through 4 above to generate the grade distribution report.</p>
            </div>
        </template>
    </main>

    <footer class="footer">
        © SZABDESK · SZABIST Recap Sheet Analytics
    </footer>
</body>
</html>
